name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest

    env:
      APP_ENV: test
      LOG_LEVEL: INFO
      AUTO_CREATE_TABLES: "false"
      DATABASE_URL: sqlite:///./test_ci.db
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      PUBLIC_FRONTEND_URL: http://localhost:5173
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
      RESEND_API_KEY: re_dummy
      EMAIL_FROM: test@example.com
      EMAIL_FROM_NAME: Saloon Booking
      TELEGRAM_BOT_TOKEN: 123456:dummy
      BACKEND_API_URL: http://localhost:8000
      TELEGRAM_AUTH_SOURCE: db
      BOT_TIMEZONE: Europe/Vilnius
      BARBER_REMINDER_MINUTES: "15"
      BARBER_REMINDER_CHECK_INTERVAL_SECONDS: "60"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      ADMIN_SESSION_SECRET: test_session_secret
      ADMIN_SESSION_EXPIRE_MINUTES: "60"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest

      - name: Compile Python files
        working-directory: backend
        run: python -m compileall app telegram_bot
